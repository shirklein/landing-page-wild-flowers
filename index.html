<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פרחי הבר של ישראל</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: auto; }

    body {
      background: #fff;
      overflow-x: hidden;
    }

    /* Tall container that provides the scroll range */
    #scroll-track {
      height: 450vh;
      position: relative;
    }

    /* Sticky viewport — stays pinned while user scrolls through scroll-track */
    #stage {
      position: sticky;
      top: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #bee-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Scroll-hint arrow — fades out once user starts scrolling */
    #hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 1;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 10;
    }
    #hint.hidden { opacity: 0; }
    #hint span {
      font-family: 'Narkiss Yair Variable', 'David', serif;
      font-size: 13px;
      color: #2D2D8A;
      letter-spacing: 0.04em;
    }
    #hint svg {
      animation: bounce 1.4s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }

    #home-btn {
      position: fixed;
      bottom: 3rem;
      left: 3rem;
      width: 80px;
      height: 80px;
      z-index: 100;
      display: block;
      animation: spin 8s linear infinite;
      transition: animation-play-state 0.2s;
    }
    #home-btn:hover {
      animation-play-state: paused;
    }
    #home-btn img:first-child {
      width: 100%;
      height: 100%;
      display: block;
    }
    #home-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 45%;
      height: 45%;
      object-fit: contain;
      transform: translate(-50%, -50%);
      animation: counter-spin 8s linear infinite;
    }
    #home-btn:hover #home-icon {
      animation-play-state: paused;
    }
    @keyframes counter-spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(-360deg); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div id="scroll-track">
  <div id="stage">
    <video
      id="bee-video"
      src="דבורה מעופפת.mp4"
      muted
      playsinline
      preload="auto"
    ></video>
  </div>
</div>

<a id="home-btn" href="/" title="דף הבית">
  <img src="Asset 3.svg" alt="דף הבית" />
  <img id="home-icon" src="Asset 1 2 copy.svg" alt="" />
</a>

<div id="hint">
  <span>גללו למטה</span>
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 4v12M4 10l6 6 6-6" stroke="#2D2D8A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>

<script>
const video = document.getElementById('bee-video');
const hint  = document.getElementById('hint');

video.muted = true;
video.loop  = true;

video.addEventListener('loadedmetadata', () => video.play());
if (video.readyState >= 1) video.play();

window.addEventListener('scroll', () => {
  if (window.scrollY > 20 && !hint.classList.contains('hidden')) {
    hint.classList.add('hidden');
  }
}, { passive: true });
</script>
</body>
</html>
