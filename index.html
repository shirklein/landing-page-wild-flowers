<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פרחי הבר — זרעים מהטבע הישראלי</title>
  <style>
    @font-face {
      font-family: 'Narkiss Yair Variable';
      src: url('NarkissYair-Variable-TRIAL.ttf') format('truetype');
      font-weight: 100 900;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #ffffff;
      --sage: #360EA7;
      --dark-sage: #360EA7;
      --terracotta: #360EA7;
      --sand: #d0cce8;
      --text: #360EA7;
      --light-text: #360EA7;
    }

    body {
      font-family: 'Narkiss Yair Variable', serif;
      background-color: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── ניווט ── */
    nav {
      background-color: var(--dark-sage);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      color: var(--cream);
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--sand);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--cream);
    }

    /* ── עמודים ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── עמוד הבית ── */
    .hero {
      background: linear-gradient(160deg, #e8ead0 0%, var(--cream) 60%);
      text-align: center;
      padding: 6rem 2rem 4rem;
      border-bottom: 2px solid var(--sand);
    }

    .hero-badge {
      display: inline-block;
      background: var(--sage);
      color: var(--cream);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 0;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--dark-sage);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.15rem;
      color: var(--light-text);
      max-width: 560px;
      margin: 0 auto 2.5rem;
      line-height: 1.8;
    }

    .btn-primary {
      background: var(--terracotta);
      color: #fff;
      border: none;
      padding: 0.85rem 2.5rem;
      font-family: 'Narkiss Yair Variable', serif;
      font-size: 1rem;
      border-radius: 0;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      background: #a85d38;
      transform: translateY(-1px);
    }

    .about-section {
      max-width: 760px;
      margin: 5rem auto;
      padding: 0 2rem;
      display: grid;
      gap: 3rem;
    }

    .about-section h2 {
      font-size: 1.7rem;
      color: var(--dark-sage);
      margin-bottom: 0.75rem;
    }

    .about-section p {
      line-height: 1.9;
      color: var(--light-text);
      font-size: 1.05rem;
    }

    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      padding: 0 2rem;
      max-width: 900px;
      margin: 0 auto 5rem;
    }

    .value-card {
      background: #fff;
      border: 1px solid var(--sand);
      border-radius: 0;
      padding: 1.5rem;
      text-align: center;
    }

    .value-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .value-card h3 { color: var(--dark-sage); margin-bottom: 0.5rem; }
    .value-card p { font-size: 0.9rem; color: var(--light-text); line-height: 1.6; }

    /* ── חנות הזרעים ── */
    .shop-header {
      background: var(--dark-sage);
      color: var(--cream);
      text-align: center;
      padding: 4rem 2rem 3rem;
    }

    .shop-header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .shop-header p { font-size: 1rem; opacity: 0.8; }

    .seeds-grid {
      display: table;
      width: 100%;
      border-top: 2px solid #360EA7;
      border-collapse: collapse;
    }

    .seed-card {
      display: table-row;
      cursor: pointer;
    }

    .seed-card:hover > * { background: #f0ece6; }
    .seed-card.hover-yellow:hover > * { background: #CFFF10; }
    .seed-card.hover-yellow2:hover > * { background: #FFF22D; }
    .seed-card.hover-pink:hover > * { background: #FFC5EE; }
    .seed-card.hover-teal:hover > * { background: #93EDEB; }
    .seed-card.hover-orange:hover > * { background: #FFB400; }
    .seed-card.hover-magenta:hover > * { background: #F7559D; }
    .seed-card.hover-cyan:hover > * { background: #00CCF0; }

    .seed-card > * {
      display: table-cell;
      vertical-align: middle;
      padding: 1rem 1.5rem;
      border-bottom: 2px solid #360EA7;
    }

    .seed-card-name-col {
      text-align: right;
      padding-right: 3rem;
      white-space: nowrap;
    }

    .seed-card-name {
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      font-weight: 400;
      color: #360EA7;
      line-height: 1.2;
      display: inline;
    }

    .seed-card-name-row { display: contents; }

    .seed-card .latin {
      font-style: italic;
      font-size: clamp(0.75rem, 1.2vw, 1rem);
      color: #360EA7;
      text-align: right;
      width: 99%;
    }

    .seed-card .tag {
      font-size: 0.8rem;
      color: #360EA7;
      white-space: nowrap;
    }

    .seed-card .tag.rarity {
      font-weight: 600;
      opacity: 0.7;
      font-size: 0.78rem;
      vertical-align: middle;
      padding-right: 0.5rem;
    }

    .seed-card .tag.price {
      font-weight: 700;
      font-size: 1.1rem;
      text-align: center;
      padding-left: 1rem;
      white-space: nowrap;
    }

    /* ── עמוד מוצר ── */
    .product-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 64px);
    }

    .product-left {
      background: #fff;
    }

    .product-right {
      padding: 2.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .product-back button {
      background: none;
      border: 1px solid var(--sage);
      color: var(--sage);
      font-family: 'Narkiss Yair Variable', serif;
      padding: 0.4rem 1rem;
      border-radius: 0;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .product-latin-top {
      font-style: italic;
      font-size: 1rem;
      color: var(--sage);
      margin-bottom: -0.5rem;
    }

    #product-name {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      color: var(--sage);
      line-height: 1.1;
    }

    .details-list {
      list-style: none;
      border-top: 1px solid var(--sage);
      margin-bottom: 1rem;
    }

    .details-list li {
      display: flex;
      justify-content: space-between;
      padding: 0.65rem 0;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--sage);
    }

    .details-list li span:first-child {
      font-weight: 600;
    }

    .details-list li:not(:last-child) { border-bottom: 1px solid #360EA7; }
    .details-list li span:first-child { color: var(--light-text); }
    .details-list li span:last-child { font-weight: bold; color: var(--text); }

    footer {
      background: var(--dark-sage);
      color: var(--sand);
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }

    /* ── עמוד הבית — fixed stage ── */
    #home-scroll-space {
      height: calc(7 * 160vh + 200vh);
    }

    #text-stage {
      position: fixed;
      top: 40vh;
      left: 50%;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 0 5rem 2rem 5vw;
      pointer-events: none;
    }

    #frame-dots {
      position: fixed;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 200;
      pointer-events: none;
    }

    .frame-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      border: 1.5px solid #360EA7;
      background: transparent;
      transition: background 0.3s, transform 0.3s;
    }

    .frame-dot.active {
      background: #360EA7;
      transform: scale(1.4);
    }

    #scroll-hint {
      position: fixed;
      bottom: 2.5rem;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--text);
      font-size: 0.85rem;
      opacity: 0.6;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    #scroll-hint.hidden {
      opacity: 0;
    }

    #scroll-hint svg {
      animation: bounce 1.4s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(5px); }
    }

    .frame-text {
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      color: var(--text);
      text-align: right;
      width: 100%;
      line-height: 1.5;
    }

    .frame-text .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text);
      margin-right: 2px;
      vertical-align: middle;
      animation: blink 0.8s steps(1) infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── גלוב פריים 5 ── */
    #globe-wrap {
      position: fixed;
      top: 64px;
      left: 0;
      width: 50%;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }
    #globe-canvas {
      width: 38vw;
      height: 38vw;
    }

    /* ── מלבנים פריים 3 ── */
    #cards-frame3 {
      position: fixed;
      top: 64px;
      left: 0;
      width: 50%;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      z-index: 2;
    }
    .cards-grid {
      position: relative;
      width: 42vw;
    }
    .cards-grid-back {
      position: absolute;
      width: 42vw;
      transform: scaleX(-1);
      pointer-events: none;
    }
    #flower-wrap {
      position: fixed;
      top: 64px;
      left: 0;
      width: 50%;
      bottom: 0;
      pointer-events: none;
    }
    #flower-anim {
      position: absolute;
      left: 50%;
      top: 65%;
      /* stem base at globe collapse point (transform-origin: center 65%) */
      transform: translateX(-50%) translateY(-90.2%);
      max-width: 14.25vw;
      max-height: 30vh;
      width: auto;
      height: auto;
      display: none;
    }
    .card-back {
      position: absolute;
      opacity: 0;
      will-change: left, top, width, height, clip-path;
    }
    .card-rect {
      position: absolute;
      opacity: 0;
      will-change: left, top, width, height, clip-path;
    }
    .card-rect.morphing {
      transition:
        left 1s cubic-bezier(0.4,0,0.2,1),
        top 1s cubic-bezier(0.4,0,0.2,1),
        width 1s cubic-bezier(0.4,0,0.2,1),
        height 1s cubic-bezier(0.4,0,0.2,1),
        clip-path 1s cubic-bezier(0.4,0,0.2,1);
    }
    .card-label {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 80%;
      height: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }
    .card-label img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      clip-path: polygon(50% 50%, 50% 0%, 50% 0%);
    }
    .card-label span {
      font-family: 'Narkiss Yair Variable', serif;
      font-size: clamp(9px, 1.2vw, 18px);
      color: #360EA7;
      position: relative;
      z-index: 1;
      white-space: nowrap;
    }
    .card-label.visible { opacity: 1; }
    .card-label.visible img {
      animation: revealCircle 0.65s linear forwards;
    }
    @keyframes revealCircle {
      0%   { clip-path: polygon(50% 50%, 50% 0%, 50% 0%); }
      12%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%); }
      25%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 50%); }
      37%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%); }
      50%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 50% 100%); }
      62%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%); }
      75%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 50%); }
      87%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%); }
      100% { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
    }
    @keyframes spin-ring {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── זרעים מתעופפים ── */
    .seed-p {
      position: fixed;
      width: 46px;
      opacity: 0;
      pointer-events: none;
      will-change: transform;
    }

    .btn-shop {
      background: var(--text);
      color: #fff;
      border: none;
      padding: 0.85rem 2.5rem;
      font-family: 'Narkiss Yair Variable', serif;
      font-size: 1rem;
      border-radius: 0;
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-top: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s, background 0.2s, transform 0.1s;
    }

    .btn-shop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-shop:hover {
      background: #2508a0;
      transform: translateY(-1px);
    }
  </style>
</head>

  function rectClipPath() {
    const pts = [];

    }

    const pos = [];
    for (let r=0; r<ROWS; r++) {
      for (let c=0; c<COLS; c++) {
        const phi1 = phiEdges[r]   + GAP;
        const phi2 = phiEdges[r+1] - GAP;
        const lam1 = lamEdges[c]   + GAP;
        const lam2 = lamEdges[c+1] - GAP;

        // bounding box via dense sampling
        const xs=[], ys=[];
        const S=16;
        for (let i=0;i<=S;i++) {
          const t=i/S;
          [xy(phi1,lam1+t*(lam2-lam1)), xy(phi2,lam1+t*(lam2-lam1))].forEach(p=>{xs.push(p.x);ys.push(p.y);});
          [xy(phi1+t*(phi2-phi1),lam1), xy(phi1+t*(phi2-phi1),lam2)].forEach(p=>{xs.push(p.x);ys.push(p.y);});
        }
        const xMin=Math.min(...xs), xMax=Math.max(...xs);
        const yMin=Math.min(...ys), yMax=Math.max(...ys);
        const bw=xMax-xMin, bh=yMax-yMin;

        function pct(p) {
          const px = ((p.x-xMin)/bw*100).toFixed(2);
          const py = ((p.y-yMin)/bh*100).toFixed(2);
          return `${px}% ${py}%`;
        }
        const pts = [];
        for (let i=0;i<EDGE_N;i++) { const t=i/EDGE_N; pts.push(pct(xy(phi1,lam1+t*(lam2-lam1)))); }
        for (let i=0;i<EDGE_N;i++) { const t=i/EDGE_N; pts.push(pct(xy(phi1+t*(phi2-phi1),lam2))); }
        for (let i=0;i<EDGE_N;i++) { const t=i/EDGE_N; pts.push(pct(xy(phi2,lam2+t*(lam1-lam2)))); }
        for (let i=0;i<EDGE_N;i++) { const t=i/EDGE_N; pts.push(pct(xy(phi2+t*(phi1-phi2),lam1))); }

        const phiC=(phi1+phi2)/2, lamC=(lam1+lam2)/2;
        const z = Math.cos(phiC)*Math.cos(lamC);

        pos.push({
          left: cx+xMin, top: cy+yMin,
          width: bw, height: bh,
          clipPath: `polygon(${pts.join(',')})`,
          z
        });
      }
    }
    return pos;
  }

  // parse "polygon(x1% y1%, x2% y2%, ...)" → flat array of numbers
  function parsePoly(s) {
    return s.replace('polygon(','').replace(')','').split(',').flatMap(pt => pt.trim().split(' ').map(parseFloat));
  }

  // interpolate two polygon strings with same point count
  function lerpPoly(a, b, t) {
    const pa = parsePoly(a), pb = parsePoly(b);
    const pts = [];
    for (let i=0; i<pa.length; i+=2) {
      const x = pa[i]   + (pb[i]   - pa[i])   * t;
      const y = pa[i+1] + (pb[i+1] - pa[i+1]) * t;
      pts.push(`${x.toFixed(2)}% ${y.toFixed(2)}%`);
    }
    return `polygon(${pts.join(',')})`;
  }

  // lerp between grid and globe position arrays
  function lerpPositions(gp, sp, t) {
    return gp.map((g, i) => ({
      left:     g.left     + (sp[i].left     - g.left)     * t,
      top:      g.top      + (sp[i].top      - g.top)      * t,
      width:    g.width    + (sp[i].width    - g.width)    * t,
      height:   g.height   + (sp[i].height   - g.height)   * t,
      clipPath: lerpPoly(g.clipPath || RECT_CLIP, sp[i].clipPath, t),
      z: sp[i].z,
    }));
  }

  function syncBackGridSize() {
    backGrid.style.height = cardsGrid.style.height;
  }

  function applyBackPositions(positions) {
    backEls.forEach((c, i) => {
      const p = positions[i];
      c.style.left   = p.left   + 'px';
      c.style.top    = p.top    + 'px';
      c.style.width  = p.width  + 'px';
      c.style.height = p.height + 'px';
      if (p.clipPath) c.style.clipPath = p.clipPath;
      if (p.z !== undefined) c.style.zIndex = Math.round(-p.z * 100 + 99);
      // show only when panel is on the back (z < 0 in front frame = front in mirrored frame)
      c.style.opacity = p.z <= 0 ? Math.min(1, -p.z * 5 + 0.15).toFixed(2) : '0';
    });
  }

  function hideBackPanels() {
    backEls.forEach(c => { c.style.opacity = '0'; });
  }

  function applyPositions(positions, withTransition) {
    cardEls.forEach((c,i) => {
      if (withTransition) c.classList.add('morphing');
      else c.classList.remove('morphing');
    });
    cardEls.forEach((c,i) => {
      const p = positions[i];
      c.style.left   = p.left   + 'px';
      c.style.top    = p.top    + 'px';
      c.style.width  = p.width  + 'px';
      c.style.height = p.height + 'px';
      if (p.clipPath) c.style.clipPath = p.clipPath;
      if (p.z !== undefined) c.style.zIndex = Math.round(p.z * 100 + 100);
    });
  }

  let _gridPos   = null;
  let _globePos  = null;
  let _globeShown = false;

  function initCardLayout() {
    _gridPos  = computeGridPositions();
    _globePos = computeGlobePositions();
    applyPositions(_gridPos.map(p => ({...p, clipPath: RECT_CLIP, z: undefined})), false);
    cardEls.forEach(c => c.style.zIndex = '');
    _globeShown = false;
  }

  window.addEventListener('resize', () => {
    cardEls.forEach(c => c.classList.remove('morphing'));
    initCardLayout();
    if (_globeShown) applyPositions(_globePos = computeGlobePositions(), false);
  });

  requestAnimationFrame(initCardLayout);

  // cards appear after "24" is fully typed in frame 2
  const CARDS_TRIGGER_CHAR = sentences[2].indexOf('24') + 2;
  const CARDS_TRIGGER_P    = (CARDS_TRIGGER_CHAR / sentences[2].length) * TYPE_END;

  const NDIRIM_CHAR = sentences[3].indexOf('נדירים'); // 12

  function animateCards(frameIdx, progress, opacity, chars) {
    // visible in frame 2 (after "24" typed) and all of frame 3; fade with frame 3
    if (frameIdx === 2) {
      cardsEl.style.opacity = 1;
      const localP = Math.max(0, (progress - CARDS_TRIGGER_P) / (TYPE_END - CARDS_TRIGGER_P));
      cardEls.forEach((c, i) => {
        c.style.opacity = localP > i / 24 ? 1 : 0;
      });
      nidirLabels.forEach(({ wrap }) => wrap.classList.remove('visible'));
    } else if (frameIdx === 3) {
      cardsEl.style.opacity = 1;
      cardsEl.style.transform = '';
      cardsEl.style.transformOrigin = '';
      cardsEl.style.clipPath = '';
      cardEls.forEach(c => { c.style.opacity = 1; });
      const showNdirim = chars >= NDIRIM_CHAR;
      nidirLabels.forEach(({ wrap }) => {
        if (showNdirim && !wrap.classList.contains('visible')) {
          wrap.classList.remove('visible');
          void wrap.offsetWidth;
          wrap.classList.add('visible');
        } else if (!showNdirim) {
          wrap.classList.remove('visible');
        }
      });
    } else if (frameIdx === 4) {
      cardsEl.style.opacity = 1;
      nidirLabels.forEach(({ wrap }) => wrap.classList.remove('visible'));
      globeWrap.style.opacity = 0;
      stopGlobe();
      _globeShown = true;
      flowerEl.style.display = 'none';

      const gp = _gridPos  || (_gridPos  = computeGridPositions());
      const sp = _globePos || (_globePos = computeGlobePositions(0));

      const MORPH_END    = 0.217;  // "הים" starts
      const HAMAKOM_END  = 0.542;  // end of "המקומי"

      syncBackGridSize();
      if (progress <= MORPH_END) {
        // Phase 1: grid → globe morph
        cardsEl.style.transform = '';
        cardEls.forEach(c => { c.style.opacity = 1; c.classList.remove('morphing'); });
        hideBackPanels();
        const t  = Math.min(1, progress / MORPH_END);
        const et = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        applyPositions(lerpPositions(
          gp.map(p => ({...p, clipPath: RECT_CLIP})), sp, et
        ), false);
      } else {
        // Phase 2: 360° rotation + tilt, ends at "המקומי"
        cardEls.forEach(c => c.classList.remove('morphing'));
        const rp  = Math.min(1, (progress - MORPH_END) / (HAMAKOM_END - MORPH_END));
        const rep = rp < 0.5 ? 2*rp*rp : -1+(4-2*rp)*rp;
        const lamOff  = rep * 2 * Math.PI;   // 360°
        const tiltDeg = rep * (-12);
        cardsEl.style.transform = `rotate(${tiltDeg.toFixed(2)}deg)`;
        backGrid.style.transform = `scaleX(-1) rotate(${tiltDeg.toFixed(2)}deg)`;
        const rotPos = computeGlobePositions(lamOff);
        applyPositions(rotPos, false);
        // front panels: show when z > 0; hide when behind
        rotPos.forEach((p, i) => {
          cardEls[i].style.opacity = p.z > 0 ? '1' : '0';
        });
        // back panels: mirrored copy, show when z < 0
        applyBackPositions(rotPos);
      }

    } else if (frameIdx === 5) {
      cardsEl.style.opacity = 1;
      cardEls.forEach(c => { c.style.opacity = 1; c.classList.remove('morphing'); });
      nidirLabels.forEach(({ wrap }) => wrap.classList.remove('visible'));
      globeWrap.style.opacity = 0;
      stopGlobe();
      // 360° complete → same view as start, hold tilt
      backGrid.style.transform = 'scaleX(-1)';
      hideBackPanels();
      const sp5 = _globePos || (_globePos = computeGlobePositions(0));
      applyPositions(sp5, false);
      // shrink toward lower point so poppy aligns with text
      cardsEl.style.transformOrigin = 'center 65%';

      // "זאת גם הסיבה שהם קלים לגידול בארץ" → globe shrinks to point
      // "ומצמיחן" → poppy grows from that point
      const SHRINK_END   = 0.162;         // globe reaches scale=0 (end of "בארץ")
      const FLOWER_START = SHRINK_END * 0.776; // globe at ~10% size → poppy starts
      const GROW_END     = 0.206;         // poppy fully grown (end of "ומצמיחים")

      // globe shrink — independent of flower
      if (progress < SHRINK_END) {
        const tp  = progress / SHRINK_END;
        const tep = tp < 0.5 ? 2*tp*tp : -1+(4-2*tp)*tp;
        cardsEl.style.transform = `rotate(-12deg) scale(${(1 - tep).toFixed(4)})`;
      } else {
        cardsEl.style.transform = 'rotate(-12deg) scale(0)';
      }

      // poppy — starts when globe is at 2% (overlaps last moment of shrink)
      if (progress >= FLOWER_START) {
        const fp = Math.min(1, (progress - FLOWER_START) / (GROW_END - FLOWER_START));
        const fi = Math.min(39, Math.floor(fp * 40));
        flowerEl.src = flowerFrames[fi].src;
        flowerEl.style.display = 'block';
      } else {
        flowerEl.style.display = 'none';
      }
    } else if (frameIdx === 6) {
      nidirLabels.forEach(({ wrap }) => wrap.classList.remove('visible'));
      globeWrap.style.opacity = 0;
      stopGlobe();
      cardsEl.style.opacity = 1;
      cardsEl.style.transformOrigin = '';
      cardEls.forEach(c => { c.style.opacity = 1; c.classList.remove('morphing'); });
      syncBackGridSize();
      hideBackPanels();
      backGrid.style.transform = 'scaleX(-1)';

      if (!_gridPos) { _gridPos = computeGridPositions(); }
      const sp6 = _globePos || (_globePos = computeGlobePositions(0));
      applyPositions(sp6, false);
      // show fully grown poppy in last frame
      flowerEl.src = flowerFrames[39].src;
      flowerEl.style.display = 'block';
      cardsEl.style.opacity = 0;

    } else {
      nidirLabels.forEach(({ wrap }) => wrap.classList.remove('visible'));
      globeWrap.style.opacity = 0;
      stopGlobe();
      _globeShown = false;
      cardsEl.style.opacity = 0;
    }
  }

  // ── Globe renderer ────────────────────────────────────────────────────────────
  const globeWrap   = document.getElementById('globe-wrap');
  const globeCanvas = document.getElementById('globe-canvas');
  const globeCtx    = globeCanvas.getContext('2d');
  let globeRot      = 0;
  let globeLastTs   = null;
  let globeRafId    = null;

  function resizeGlobe() {
    const s = globeCanvas.offsetWidth;
    globeCanvas.width = globeCanvas.height = s * window.devicePixelRatio;
    globeCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  resizeGlobe();
  window.addEventListener('resize', () => { resizeGlobe(); renderGlobe(globeRot); });

  function ortho(phi, lam, R) {
    return {
      x: R * Math.cos(phi) * Math.sin(lam),
      y: -R * Math.sin(phi),
      z: Math.cos(phi) * Math.cos(lam)
    };
  }

  function drawGlobePanel(cx, cy, R, phi1, phi2, lam1, lam2, color) {
    const N = 12;
    globeCtx.beginPath();
    for (let i = 0; i <= N; i++) {
      const l = lam1 + (lam2 - lam1) * i / N;
      const p = ortho(phi1, l, R);
      i === 0 ? globeCtx.moveTo(cx + p.x, cy + p.y) : globeCtx.lineTo(cx + p.x, cy + p.y);
    }
    for (let i = 1; i <= N; i++) {
      const p = ortho(phi1 + (phi2 - phi1) * i / N, lam2, R);
      globeCtx.lineTo(cx + p.x, cy + p.y);
    }
    for (let i = 1; i <= N; i++) {
      const l = lam2 + (lam1 - lam2) * i / N;
      const p = ortho(phi2, l, R);
      globeCtx.lineTo(cx + p.x, cy + p.y);
    }
    for (let i = 1; i <= N; i++) {
      const p = ortho(phi2 + (phi1 - phi2) * i / N, lam1, R);
      globeCtx.lineTo(cx + p.x, cy + p.y);
    }
    globeCtx.closePath();
    globeCtx.fillStyle = color;
    globeCtx.fill();
    globeCtx.strokeStyle = 'rgba(255,255,255,0.85)';
    globeCtx.lineWidth = R * 0.007;
    globeCtx.stroke();
  }

  function renderGlobe(rot) {
    const size = globeCanvas.offsetWidth;
    const cx = size / 2, cy = size / 2;
    const R  = size * 0.46;
    globeCtx.clearRect(0, 0, size, size);

    globeCtx.save();
    globeCtx.beginPath();
    globeCtx.arc(cx, cy, R, 0, Math.PI * 2);
    globeCtx.clip();

    const rows = 4, cols = 6;
    const panels = [];
    for (let row = 0; row < rows; row++) {
      const phi1 = -Math.PI / 2 + Math.PI * row / rows;
      const phi2 = -Math.PI / 2 + Math.PI * (row + 1) / rows;
      for (let col = 0; col < cols; col++) {
        const lam1 = -Math.PI + 2 * Math.PI * col / cols + rot;
        const lam2 = -Math.PI + 2 * Math.PI * (col + 1) / cols + rot;
        const z = Math.cos((phi1 + phi2) / 2) * Math.cos((lam1 + lam2) / 2);
        panels.push({ phi1, phi2, lam1, lam2, z, idx: row * cols + col });
      }
    }
    panels.sort((a, b) => a.z - b.z);
    for (const p of panels) {
      drawGlobePanel(cx, cy, R, p.phi1, p.phi2, p.lam1, p.lam2, FIXED_COLORS[p.idx]);
    }

    globeCtx.restore();
  }

  function globeLoop(ts) {
    if (!globeLastTs) globeLastTs = ts;
    globeRot += (ts - globeLastTs) / 1000 * 0.28;
    globeLastTs = ts;
    renderGlobe(globeRot);
    globeRafId = requestAnimationFrame(globeLoop);
  }
  function startGlobe() {
    if (!globeRafId) { globeLastTs = null; globeRafId = requestAnimationFrame(globeLoop); }
  }
  function stopGlobe() {
    if (globeRafId) { cancelAnimationFrame(globeRafId); globeRafId = null; }
  }

  function onScroll() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => { render(); ticking = false; });
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  render();
</script>
</body>
</html>
