<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פרחי הבר — זרעים מהטבע הישראלי</title>
  <style>
    @font-face {
      font-family: 'Narkiss Yair Variable';
      src: url('NarkissYair-Variable-TRIAL.ttf') format('truetype');
      font-weight: 100 900;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #ffffff;
      --sage: #360EA7;
      --dark-sage: #360EA7;
      --terracotta: #360EA7;
      --sand: #d0cce8;
      --text: #360EA7;
      --light-text: #360EA7;
    }

    body {
      font-family: 'Narkiss Yair Variable', serif;
      background-color: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── ניווט ── */
    nav {
      background-color: var(--dark-sage);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      color: var(--cream);
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--sand);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--cream);
    }

    /* ── עמודים ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── עמוד הבית ── */
    .hero {
      background: linear-gradient(160deg, #e8ead0 0%, var(--cream) 60%);
      text-align: center;
      padding: 6rem 2rem 4rem;
      border-bottom: 2px solid var(--sand);
    }

    .hero-badge {
      display: inline-block;
      background: var(--sage);
      color: var(--cream);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 0;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--dark-sage);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.15rem;
      color: var(--light-text);
      max-width: 560px;
      margin: 0 auto 2.5rem;
      line-height: 1.8;
    }

    .btn-primary {
      background: var(--terracotta);
      color: #fff;
      border: none;
      padding: 0.85rem 2.5rem;
      font-family: 'Narkiss Yair Variable', serif;
      font-size: 1rem;
      border-radius: 0;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      background: #a85d38;
      transform: translateY(-1px);
    }

    .about-section {
      max-width: 760px;
      margin: 5rem auto;
      padding: 0 2rem;
      display: grid;
      gap: 3rem;
    }

    .about-section h2 {
      font-size: 1.7rem;
      color: var(--dark-sage);
      margin-bottom: 0.75rem;
    }

    .about-section p {
      line-height: 1.9;
      color: var(--light-text);
      font-size: 1.05rem;
    }

    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      padding: 0 2rem;
      max-width: 900px;
      margin: 0 auto 5rem;
    }

    .value-card {
      background: #fff;
      border: 1px solid var(--sand);
      border-radius: 0;
      padding: 1.5rem;
      text-align: center;
    }

    .value-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .value-card h3 { color: var(--dark-sage); margin-bottom: 0.5rem; }
    .value-card p { font-size: 0.9rem; color: var(--light-text); line-height: 1.6; }

    /* ── חנות הזרעים ── */
    .shop-header {
      background: var(--dark-sage);
      color: var(--cream);
      text-align: center;
      padding: 4rem 2rem 3rem;
    }

    .shop-header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .shop-header p { font-size: 1rem; opacity: 0.8; }

    .seeds-grid {
      display: table;
      width: 100%;
      border-top: 2px solid #360EA7;
      border-collapse: collapse;
    }

    .seed-card {
      display: table-row;
      cursor: pointer;
    }

    .seed-card:hover > * { background: #f0ece6; }
    .seed-card.hover-yellow:hover > * { background: #CFFF10; }
    .seed-card.hover-yellow2:hover > * { background: #FFF22D; }
    .seed-card.hover-pink:hover > * { background: #FFC5EE; }
    .seed-card.hover-teal:hover > * { background: #93EDEB; }
    .seed-card.hover-orange:hover > * { background: #FFB400; }
    .seed-card.hover-magenta:hover > * { background: #F7559D; }
    .seed-card.hover-cyan:hover > * { background: #00CCF0; }

    .seed-card > * {
      display: table-cell;
      vertical-align: middle;
      padding: 1rem 1.5rem;
      border-bottom: 2px solid #360EA7;
    }

    .seed-card-name-col {
      text-align: right;
      padding-right: 3rem;
      white-space: nowrap;
    }

    .seed-card-name {
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      font-weight: 400;
      color: #360EA7;
      line-height: 1.2;
      display: inline;
    }

    .seed-card-name-row { display: contents; }

    .seed-card .latin {
      font-style: italic;
      font-size: clamp(0.75rem, 1.2vw, 1rem);
      color: #360EA7;
      text-align: right;
      width: 99%;
    }

    .seed-card .tag {
      font-size: 0.8rem;
      color: #360EA7;
      white-space: nowrap;
    }

    .seed-card .tag.rarity {
      font-weight: 600;
      opacity: 0.7;
      font-size: 0.78rem;
      vertical-align: middle;
      padding-right: 0.5rem;
    }

    .seed-card .tag.price {
      font-weight: 700;
      font-size: 1.1rem;
      text-align: left;
      padding-left: 3rem;
      white-space: nowrap;
    }

    /* ── עמוד מוצר ── */
    .product-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 64px);
    }

    .product-left {
      background: #fff;
    }

    .product-right {
      padding: 2.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .product-back button {
      background: none;
      border: 1px solid var(--sage);
      color: var(--sage);
      font-family: 'Narkiss Yair Variable', serif;
      padding: 0.4rem 1rem;
      border-radius: 0;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .product-latin-top {
      font-style: italic;
      font-size: 1rem;
      color: var(--sage);
      margin-bottom: -0.5rem;
    }

    #product-name {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      color: var(--sage);
      line-height: 1.1;
    }

    .details-list {
      list-style: none;
      border-top: 1px solid var(--sage);
      margin-bottom: 1rem;
    }

    .details-list li {
      display: flex;
      justify-content: space-between;
      padding: 0.65rem 0;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--sage);
    }

    .details-list li span:first-child {
      font-weight: 600;
    }

    .details-list li:not(:last-child) { border-bottom: 1px solid #360EA7; }
    .details-list li span:first-child { color: var(--light-text); }
    .details-list li span:last-child { font-weight: bold; color: var(--text); }

    footer {
      background: var(--dark-sage);
      color: var(--sand);
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }

    /* ── עמוד הבית — fixed stage ── */
    #home-scroll-space {
      height: calc(7 * 160vh + 200vh);
    }

    #text-stage {
      position: fixed;
      top: 40vh;
      left: 50%;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 0 5vw 2rem;
      pointer-events: none;
    }

    #frame-dots {
      position: fixed;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 200;
      pointer-events: none;
    }

    .frame-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      border: 1.5px solid #360EA7;
      background: transparent;
      transition: background 0.3s, transform 0.3s;
    }

    .frame-dot.active {
      background: #360EA7;
      transform: scale(1.4);
    }

    #scroll-hint {
      position: fixed;
      bottom: 2.5rem;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      color: var(--text);
      font-size: 0.85rem;
      opacity: 0.6;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    #scroll-hint.hidden {
      opacity: 0;
    }

    #scroll-hint svg {
      animation: bounce 1.4s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(5px); }
    }

    .frame-text {
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      color: var(--text);
      text-align: right;
      width: 100%;
      line-height: 1.5;
    }

    .frame-text .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text);
      margin-right: 2px;
      vertical-align: middle;
      animation: blink 0.8s steps(1) infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── גלוב פריים 5 ── */
    #globe-wrap {
      position: fixed;
      top: 64px;
      left: 0;
      width: 50%;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }
    #globe-canvas {
      width: 38vw;
      height: 38vw;
    }

    /* ── מלבנים פריים 3 ── */
    #cards-frame3 {
      position: fixed;
      top: 64px;
      left: 0;
      width: 50%;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }
    .cards-grid {
      position: relative;
      width: 42vw;
    }
    .card-rect {
      position: absolute;
      opacity: 0;
      will-change: left, top, width, height, clip-path;
    }
    .card-rect.morphing {
      transition:
        left 1s cubic-bezier(0.4,0,0.2,1),
        top 1s cubic-bezier(0.4,0,0.2,1),
        width 1s cubic-bezier(0.4,0,0.2,1),
        height 1s cubic-bezier(0.4,0,0.2,1),
        clip-path 1s cubic-bezier(0.4,0,0.2,1);
    }
    .card-label {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 80%;
      height: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }
    .card-label img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      clip-path: polygon(50% 50%, 50% 0%, 50% 0%);
    }
    .card-label span {
      font-family: 'Narkiss Yair Variable', serif;
      font-size: clamp(9px, 1.2vw, 18px);
      color: #360EA7;
      position: relative;
      z-index: 1;
      white-space: nowrap;
    }
    .card-label.visible { opacity: 1; }
    .card-label.visible img {
      animation: revealCircle 0.65s linear forwards;
    }
    @keyframes revealCircle {
      0%   { clip-path: polygon(50% 50%, 50% 0%, 50% 0%); }
      12%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%); }
      25%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 50%); }
      37%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%); }
      50%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 50% 100%); }
      62%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%); }
      75%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 50%); }
      87%  { clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%); }
      100% { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
    }

    /* ── זרעים מתעופפים ── */
    .seed-p {
      position: fixed;
      width: 46px;
      opacity: 0;
      pointer-events: none;
      will-change: transform;
    }

    .btn-shop {
      background: var(--text);
      color: #fff;
      border: none;
      padding: 0.85rem 2.5rem;
      font-family: 'Narkiss Yair Variable', serif;
      font-size: 1rem;
      border-radius: 0;
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-top: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s, background 0.2s, transform 0.1s;
    }

    .btn-shop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-shop:hover {
      background: #2508a0;
      transform: translateY(-1px);
    }
  </style>
</head>

  renderShop();

  // ── Fixed-stage scroll typewriter ──
  const sentences = [
    "במשך שנים רבות, שמר הגן הבוטני בגבעת רם על פרחי הבר של ישראל.\n<span style=\"font-size:2em;line-height:1.2\">עכשיו, גם אתם יכולים.</span>",
    "הגן הבוטני יוצא בפרויקט הפצה של פרחי בר מקומיים, במטרה להשיב אותם אל הטבע של ישראל.",

    "מוזמנים לשוטט באתר ולבחור את הפרח שלכם :)"
  ];

  const TYPE_END   = 0.55; // fraction of frame: typing done
  const FADE_START = 0.72; // fraction: start fading

  const tw         = document.getElementById('typewriter');
  const shopBtn    = document.getElementById('btn-shop');
  const scrollHint = document.getElementById('scroll-hint');
  const seedEls = Array.from(document.querySelectorAll('.seed-p'));
  const frameDots  = Array.from(document.querySelectorAll('.frame-dot'));
  let lastChars   = -1;
  let lastOpacity = -1;
  let lastDotIdx  = -1;
  let ticking     = false;

  // "במשך שנים רבות" — pre-typed at load
  const PRE_TYPED = "במשך שנים רבות";

  function getFrameH() { return window.innerHeight * 1.6; }

  function render() {
    const scrollY  = window.scrollY;
    const FRAME_H  = getFrameH();
    const total    = sentences.length;

    // hide scroll hint once user starts scrolling
    if (scrollY > 10) {
      scrollHint.classList.add('hidden');
    } else {
      scrollHint.classList.remove('hidden');
    }

    const rawFrame = scrollY / FRAME_H;
    const frameIdx = Math.min(total - 1, Math.floor(rawFrame));

    if (frameIdx !== lastDotIdx) {
      lastDotIdx = frameIdx;
      frameDots.forEach((d, i) => d.classList.toggle('active', i === frameIdx));
    }
    const progress = frameIdx < total - 1
      ? Math.min(1, rawFrame - frameIdx)
      : Math.min(1, (scrollY - frameIdx * FRAME_H) / (FRAME_H * TYPE_END));

    const text   = sentences[frameIdx];
    const isLast = frameIdx === total - 1;

    // for frame 0: start from PRE_TYPED length, type the rest via scroll
    let chars;
    if (frameIdx === 0) {
      const preLen  = PRE_TYPED.length;
      const typeP   = Math.min(1, progress / TYPE_END);
      const scrolled = Math.floor(typeP * (text.length - preLen));
      chars = preLen + scrolled;
    } else {
      const typeP = isLast ? Math.min(1, progress) : Math.min(1, progress / TYPE_END);
      chars = Math.floor(typeP * text.length);
    }

    // opacity
    let opacity;
    if (isLast) {
      opacity = 1;
    } else {
      const fadeP = Math.max(0, (progress - FADE_START) / (1 - FADE_START));
      opacity = 1 - fadeP;
    }

    if (chars !== lastChars) {
      lastChars = chars;
      let shown = text.slice(0, chars);

      // wrap "הפצה" in a span so we can find its screen position
      if (frameIdx === 1 && chars > HIFTZE_START) {
        const end = Math.min(chars, HIFTZE_END);
        shown = shown.slice(0, HIFTZE_START)
          + `<span id="hiftze-span">${shown.slice(HIFTZE_START, end)}</span>`
          + shown.slice(end);
      }

      shown = shown.replace(/\n/g, '<br>');
      const done = chars >= text.length;
      tw.innerHTML = shown + (done ? '' : '<span class="cursor"></span>');
    }

    if (opacity !== lastOpacity) {
      lastOpacity = opacity;
      tw.style.opacity = opacity;
    }

    if (isLast && chars >= text.length) {
      shopBtn.classList.add('visible');
    } else {
      shopBtn.classList.remove('visible');
    }

    // ── זרעים מתעופפים בפריים 2 ──
    animateSeeds(frameIdx, progress, chars);

    // ── מלבנים בפריים 3 ──
    animateCards(frameIdx, progress, opacity, chars);
  }

  // index of ה in "הפצה" within sentence[1]
  const HIFTZE_START = sentences[1].indexOf('הפצה');
  const HIFTZE_END   = HIFTZE_START + 4;

  const SEED_CONFIGS = [
    { angle: 180, dist: 1400, sway:  8, freq: 2.6, delay: 0.00, spin:  280, size: 28 },
    { angle: 178, dist: 1350, sway:  6, freq: 3.2, delay: 0.04, spin: -320, size: 22 },
    { angle: 182, dist: 1500, sway: 10, freq: 2.0, delay: 0.08, spin:  360, size: 18 },
    { angle: 176, dist: 1420, sway:  7, freq: 2.9, delay: 0.03, spin: -260, size: 26 },
    { angle: 183, dist: 1300, sway:  9, freq: 3.5, delay: 0.06, spin:  400, size: 16 },
    { angle: 179, dist: 1380, sway:  5, freq: 2.3, delay: 0.10, spin: -300, size: 20 },
    { angle: 181, dist: 1460, sway: 11, freq: 3.0, delay: 0.02, spin:  340, size: 14 },
    { angle: 177, dist: 1320, sway:  8, freq: 2.7, delay: 0.07, spin: -380, size: 24 },
    { angle: 184, dist: 1550, sway:  6, freq: 3.3, delay: 0.05, spin:  260, size: 15 },
    { angle: 178, dist: 1250, sway: 10, freq: 2.1, delay: 0.12, spin: -310, size: 20 },
    { angle: 181, dist: 1480, sway:  7, freq: 3.8, delay: 0.09, spin:  420, size: 12 },
    { angle: 179, dist: 1360, sway:  9, freq: 2.5, delay: 0.01, spin: -270, size: 26 },
    { angle: 182, dist: 1420, sway:  6, freq: 3.1, delay: 0.11, spin:  350, size: 18 },
    { angle: 180, dist: 1300, sway:  8, freq: 2.8, delay: 0.06, spin: -290, size: 14 },
    { angle: 177, dist: 1500, sway:  7, freq: 3.6, delay: 0.13, spin:  380, size: 11 },
  ];

  let seedOrigin = null; // {x, y} in viewport coords

  function animateSeeds(frameIdx, progress, chars) {
    if (frameIdx !== 1) {
      seedEls.forEach(s => { s.style.opacity = 0; });
      seedOrigin = null;
      return;
    }

    // capture origin when "הפצה" first appears
    if (chars >= HIFTZE_START) {
      const span = document.getElementById('hiftze-span');
      if (span) {
        const r = span.getBoundingClientRect();
        seedOrigin = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }
    }

    if (!seedOrigin) {
      seedEls.forEach(s => { s.style.opacity = 0; });
      return;
    }

    // local progress from when הפצה starts typing
    const triggerP = (HIFTZE_START / sentences[1].length) * TYPE_END;
    const localP   = Math.max(0, (progress - triggerP) / (1 - triggerP));

    SEED_CONFIGS.forEach((cfg, i) => {
      const el = seedEls[i];
      const p  = Math.max(0, localP - cfg.delay);

      if (p <= 0) { el.style.opacity = 0; return; }

      // trajectory
      const rad   = (cfg.angle * Math.PI) / 180;
      const eased = 1 - Math.pow(1 - p, 1.6); // ease-out
      const dist  = eased * cfg.dist;
      const baseX = seedOrigin.x + Math.cos(rad) * dist - 23;
      const baseY = seedOrigin.y + Math.sin(rad) * dist - 23;

      // wind sway
      const swayX = Math.sin(p * Math.PI * cfg.freq) * cfg.sway;
      const swayY = Math.cos(p * Math.PI * cfg.freq * 0.7) * cfg.sway * 0.5;

      const x = baseX + swayX;
      const y = baseY + swayY;

      // fade out only once fully off the left edge
      const offScreen = Math.max(0, -(x + 46)) / 60;
      el.style.opacity = Math.max(0, 1 - offScreen);

      const angle = p * cfg.spin;
      el.style.width     = cfg.size + 'px';
      el.style.left      = x + 'px';
      el.style.top       = y + 'px';
      el.style.transform = `rotate(${angle}deg)`;
    });
  }

  const cardsEl   = document.getElementById('cards-frame3');
  const cardsGrid = cardsEl.querySelector('.cards-grid');
  const cardEls   = Array.from(cardsEl.querySelectorAll('.card-rect'));

  const FIXED_COLORS = [
    '#93EDEB','#CFFF10','#F7559D','#00CCF0','#FFCE00','#FFCE00',
    '#FFF22D','#FFC5EE','#93EDEB','#FFC5EE','#FFCE00','#CFFF10',
    '#CFFF10','#F7559D','#FFCE00','#FFF22D','#FFF22D','#F7559D',
    '#93EDEB','#FFCE00','#00CCF0','#FFC5EE','#FFF22D','#00CCF0'
  ];

  // pick 3 random cards for "נדיר" label
  const nidirIndices = [];
  while (nidirIndices.length < 3) {
    const r = Math.floor(Math.random() * 24);
    if (!nidirIndices.includes(r)) nidirIndices.push(r);
  }
  const nidirLabels = nidirIndices.map((cardIdx, order) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-label';

    const img = document.createElement('img');
    img.src = encodeURIComponent('הקפה בעט סגול כחול.png');
    img.alt = '';
    img.style.animationDelay = (order * 0.55) + 's';

    const txt = document.createElement('span');
    txt.textContent = 'נדיר';
    wrap.appendChild(img);
    wrap.appendChild(txt);
    cardEls[cardIdx].appendChild(wrap);
    return { wrap, order };
  });

  // ── Globe morph helpers ──────────────────────────────────────────────────────
  const GLOBE_R_VW = 15;   // sphere radius in vw
  const COLS = 6, ROWS = 4;
  const EDGE_N = 5;        // polygon points per edge (→ 20 total, matching both states)

  // 20-point rectangle clip-path polygon for grid state
  function rectClipPath() {
    const pts = [];
    for (let i=0; i<EDGE_N; i++) pts.push(`${(i/EDGE_N*100).toFixed(1)}% 0%`);
    for (let i=0; i<EDGE_N; i++) pts.push(`100% ${(i/EDGE_N*100).toFixed(1)}%`);
    for (let i=0; i<EDGE_N; i++) pts.push(`${((1-i/EDGE_N)*100).toFixed(1)}% 100%`);
    for (let i=0; i<EDGE_N; i++) pts.push(`0% ${((1-i/EDGE_N)*100).toFixed(1)}%`);
    return `polygon(${pts.join(',')})`;
  }

  const RECT_CLIP = rectClipPath();

  function computeGridPositions() {
    const gap  = window.innerWidth * 0.01;
    const W    = window.innerWidth * 0.42;
    const cardW = (W - (COLS-1)*gap) / COLS;
    const cardH = cardW * 14/8;
    const h     = ROWS*cardH + (ROWS-1)*gap;
    cardsGrid.style.height = h + 'px';
    const pos = [];
    for (let r=0; r<ROWS; r++)
      for (let c=0; c<COLS; c++)
        pos.push({ left: c*(cardW+gap), top: r*(cardH+gap), width: cardW, height: cardH });
    return pos;
  }

  function computeGlobePositions() {
    const vw  = window.innerWidth / 100;
    const R   = GLOBE_R_VW * vw;
    const W   = window.innerWidth * 0.42;
    const H   = parseFloat(cardsGrid.style.height) || window.innerWidth * 0.46;
    const cx  = W/2, cy = H/2;

    // lat/lon grid — show full front hemisphere
    const phiEdges = [], lamEdges = [];
    for (let i=0; i<=ROWS; i++) phiEdges.push(-Math.PI/2 + Math.PI*i/ROWS);
    for (let i=0; i<=COLS; i++) lamEdges.push(-Math.PI/2 + Math.PI*i/COLS);

    // gap in radians ≈ 1vw / R (matching grid gap)
    const GAP = vw / R * 0.5;

    function xy(phi, lam) {
      return { x: R*Math.cos(phi)*Math.sin(lam), y: -R*Math.sin(phi) };
    }

    const pos = [];
    for (let r=0; r<ROWS; r++) {
      for (let c=0; c<COLS; c++) {
        const phi1 = phiEdges[r]   + GAP;
        const phi2 = phiEdges[r+1] - GAP;
        const lam1 = lamEdges[c]   + GAP;
        const lam2 = lamEdges[c+1] - GAP;

        // bounding box via dense sampling
        const xs=[], ys=[];
        const S=16;
        for (let i=0;i<=S;i++) {
          const t=i/S;
          [xy(phi1,lam1+t*(lam2-lam1)), xy(phi2,lam1+t*(lam2-lam1))].forEach(p=>{xs.push(p.x);ys.push(p.y);});
          [xy(phi1+t*(phi2-phi1),lam1), xy(phi1+t*(phi2-phi1),lam2)].forEach(p=>{xs.push(p.x);ys.push(p.y);});
        }
        const xMin=Math.min(...xs), xMax=Math.max(...xs);
        const yMin=Math.min(...ys), yMax=Math.max(...ys);
        const bw=xMax-xMin, bh=yMax-yMin;

        // 20-point clip-path: 5 pts per edge, no repeated corners
        function pct(p) {
          const px = ((p.x-xMin)/bw*100).toFixed(2);
          const py = ((p.y-yMin)/bh*100).toFixed(2);
          return `${px}% ${py}%`;
        }
        const pts = [];
        for (let i=0;i<EDGE_N;i++) { const t=i/EDGE_N; pts.push(pct(xy(phi1,lam1+t*(lam2-lam1)))); }  // bottom →
        for (let i=0;i<EDGE_N;i++) { const t=i/EDGE_N; pts.push(pct(xy(phi1+t*(phi2-phi1),lam2))); }  // right ↑
        for (let i=0;i<EDGE_N;i++) { const t=i/EDGE_N; pts.push(pct(xy(phi2,lam2+t*(lam1-lam2)))); }  // top ←
        for (let i=0;i<EDGE_N;i++) { const t=i/EDGE_N; pts.push(pct(xy(phi2+t*(phi1-phi2),lam1))); }  // left ↓

        // z-depth for painter sort (higher = closer to viewer)
        const phiC=(phi1+phi2)/2, lamC=(lam1+lam2)/2;
        const z = Math.cos(phiC)*Math.cos(lamC);

        pos.push({
          left: cx+xMin, top: cy+yMin,
          width: bw, height: bh,
          clipPath: `polygon(${pts.join(',')})`,
          z
        });
      }
    }
    return pos;
  }

  function applyPositions(positions, withTransition) {
    cardEls.forEach((c,i) => {
      if (withTransition) c.classList.add('morphing');
      else c.classList.remove('morphing');
    });
    cardEls.forEach((c,i) => {
      const p = positions[i];
      c.style.left   = p.left   + 'px';
      c.style.top    = p.top    + 'px';
      c.style.width  = p.width  + 'px';
      c.style.height = p.height + 'px';
      if (p.clipPath) c.style.clipPath = p.clipPath;
      if (p.z !== undefined) c.style.zIndex = Math.round(p.z * 100 + 100);
    });
  }

  let _gridPos   = null;
  let _globePos  = null;
  let _globeShown = false;

  function initCardLayout() {
    _gridPos  = computeGridPositions();
    _globePos = computeGlobePositions();
    applyPositions(_gridPos.map(p => ({...p, clipPath: RECT_CLIP, z: undefined})), false);
    cardEls.forEach(c => c.style.zIndex = '');
    _globeShown = false;
  }

  window.addEventListener('resize', () => {
    cardEls.forEach(c => c.classList.remove('morphing'));
    initCardLayout();
    if (_globeShown) applyPositions(_globePos = computeGlobePositions(), false);
  });

  requestAnimationFrame(initCardLayout);

  // cards appear after "24" is fully typed in frame 2
  const CARDS_TRIGGER_CHAR = sentences[2].indexOf('24') + 2;
  const CARDS_TRIGGER_P    = (CARDS_TRIGGER_CHAR / sentences[2].length) * TYPE_END;

  const NDIRIM_CHAR = sentences[3].indexOf('נדירים'); // 12

  function animateCards(frameIdx, progress, opacity, chars) {
    // visible in frame 2 (after "24" typed) and all of frame 3; fade with frame 3
    if (frameIdx === 2) {
      cardsEl.style.opacity = 1;
      const localP = Math.max(0, (progress - CARDS_TRIGGER_P) / (TYPE_END - CARDS_TRIGGER_P));
      cardEls.forEach((c, i) => {
        c.style.opacity = localP > i / 24 ? 1 : 0;
      });
      nidirLabels.forEach(({ wrap }) => wrap.classList.remove('visible'));
    } else if (frameIdx === 3) {
      cardsEl.style.opacity = opacity;
      cardEls.forEach(c => { c.style.opacity = 1; });
      const showNdirim = chars >= NDIRIM_CHAR;
      nidirLabels.forEach(({ wrap }) => {
        if (showNdirim && !wrap.classList.contains('visible')) {
          wrap.classList.remove('visible');
          void wrap.offsetWidth;
          wrap.classList.add('visible');
        } else if (!showNdirim) {
          wrap.classList.remove('visible');
        }
      });
    } else if (frameIdx === 4) {
      cardsEl.style.opacity = opacity;
      cardEls.forEach(c => { c.style.opacity = 1; });
      nidirLabels.forEach(({ wrap }) => wrap.classList.remove('visible'));
      globeWrap.style.opacity = 0;
      stopGlobe();
      if (!_globeShown) {
        _globeShown = true;
        _globePos = computeGlobePositions();
        // First snap to grid (no transition), then morph to globe
        applyPositions((_gridPos||computeGridPositions()).map(p=>({...p, clipPath:RECT_CLIP})), false);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          applyPositions(_globePos, true);
        }));
      }
    } else {
      nidirLabels.forEach(({ wrap }) => wrap.classList.remove('visible'));
      globeWrap.style.opacity = 0;
      stopGlobe();
      if (_globeShown) {
        _globeShown = false;
        applyPositions((_gridPos||computeGridPositions()).map(p=>({...p, clipPath:RECT_CLIP})), true);
        cardEls.forEach(c => c.style.zIndex = '');
      }
      cardsEl.style.opacity = 0;
    }
  }

  // ── Globe renderer ────────────────────────────────────────────────────────────
  const globeWrap   = document.getElementById('globe-wrap');
  const globeCanvas = document.getElementById('globe-canvas');
  const globeCtx    = globeCanvas.getContext('2d');
  let globeRot      = 0;
  let globeLastTs   = null;
  let globeRafId    = null;

  function resizeGlobe() {
    const s = globeCanvas.offsetWidth;
    globeCanvas.width = globeCanvas.height = s * window.devicePixelRatio;
    globeCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  resizeGlobe();
  window.addEventListener('resize', () => { resizeGlobe(); renderGlobe(globeRot); });

  function ortho(phi, lam, R) {
    return {
      x: R * Math.cos(phi) * Math.sin(lam),
      y: -R * Math.sin(phi),
      z: Math.cos(phi) * Math.cos(lam)
    };
  }

  function drawGlobePanel(cx, cy, R, phi1, phi2, lam1, lam2, color) {
    const N = 12;
    globeCtx.beginPath();
    for (let i = 0; i <= N; i++) {
      const l = lam1 + (lam2 - lam1) * i / N;
      const p = ortho(phi1, l, R);
      i === 0 ? globeCtx.moveTo(cx + p.x, cy + p.y) : globeCtx.lineTo(cx + p.x, cy + p.y);
    }
    for (let i = 1; i <= N; i++) {
      const p = ortho(phi1 + (phi2 - phi1) * i / N, lam2, R);
      globeCtx.lineTo(cx + p.x, cy + p.y);
    }
    for (let i = 1; i <= N; i++) {
      const l = lam2 + (lam1 - lam2) * i / N;
      const p = ortho(phi2, l, R);
      globeCtx.lineTo(cx + p.x, cy + p.y);
    }
    for (let i = 1; i <= N; i++) {
      const p = ortho(phi2 + (phi1 - phi2) * i / N, lam1, R);
      globeCtx.lineTo(cx + p.x, cy + p.y);
    }
    globeCtx.closePath();
    globeCtx.fillStyle = color;
    globeCtx.fill();
    globeCtx.strokeStyle = 'rgba(255,255,255,0.85)';
    globeCtx.lineWidth = R * 0.007;
    globeCtx.stroke();
  }

  function renderGlobe(rot) {
    const size = globeCanvas.offsetWidth;
    const cx = size / 2, cy = size / 2;
    const R  = size * 0.46;
    globeCtx.clearRect(0, 0, size, size);

    globeCtx.save();
    globeCtx.beginPath();
    globeCtx.arc(cx, cy, R, 0, Math.PI * 2);
    globeCtx.clip();

    const rows = 4, cols = 6;
    const panels = [];
    for (let row = 0; row < rows; row++) {
      const phi1 = -Math.PI / 2 + Math.PI * row / rows;
      const phi2 = -Math.PI / 2 + Math.PI * (row + 1) / rows;
      for (let col = 0; col < cols; col++) {
        const lam1 = -Math.PI + 2 * Math.PI * col / cols + rot;
        const lam2 = -Math.PI + 2 * Math.PI * (col + 1) / cols + rot;
        const z = Math.cos((phi1 + phi2) / 2) * Math.cos((lam1 + lam2) / 2);
        panels.push({ phi1, phi2, lam1, lam2, z, idx: row * cols + col });
      }
    }
    panels.sort((a, b) => a.z - b.z);
    for (const p of panels) {
      drawGlobePanel(cx, cy, R, p.phi1, p.phi2, p.lam1, p.lam2, FIXED_COLORS[p.idx]);
    }

    globeCtx.restore();
  }

  function globeLoop(ts) {
    if (!globeLastTs) globeLastTs = ts;
    globeRot += (ts - globeLastTs) / 1000 * 0.28;
    globeLastTs = ts;
    renderGlobe(globeRot);
    globeRafId = requestAnimationFrame(globeLoop);
  }
  function startGlobe() {
    if (!globeRafId) { globeLastTs = null; globeRafId = requestAnimationFrame(globeLoop); }
  }
  function stopGlobe() {
    if (globeRafId) { cancelAnimationFrame(globeRafId); globeRafId = null; }
  }

  function onScroll() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => { render(); ticking = false; });
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  render();
</script>
</body>
</html>
